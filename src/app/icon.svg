<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Rounded square background matching #202B39 (brand navy) -->
  <rect width="32" height="32" rx="7" fill="#202B39"/>
  <!-- Gold gradient fill definition -->
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8c6d4f"/>
      <stop offset="100%" style="stop-color:#c5a880"/>
    </linearGradient>
  </defs>
  <!-- Compass circle outline -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="url(#goldGrad)" stroke-width="1.5"/>
  <!-- Compass needle: North point (gold) -->
  <polygon points="16,6 18,16 16,14 14,16" fill="url(#goldGrad)"/>
  <!-- Compass needle: South point (muted) -->
  <polygon points="16,26 14,16 16,18 18,16" fill="#c5a880" opacity="0.4"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="#c5a880"/>
  <!-- Cardinal tick marks -->
  <line x1="16" y1="7" x2="16" y2="9" stroke="url(#goldGrad)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="23" x2="16" y2="25" stroke="url(#goldGrad)" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="7"  y1="16" x2="9"  y2="16" stroke="url(#goldGrad)" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="23" y1="16" x2="25" y2="16" stroke="url(#goldGrad)" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
</svg>
